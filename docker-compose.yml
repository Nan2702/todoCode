
services:
  pruebatecsupermercado: #nombre de la app establecido en application.properties
    build: pruebatecsupermercado #nombre de la carpeta donde está el DockerFile
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://pruebatecsuper:3306/pruebatecsuper?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USER_NAME: nancy
      DB_PASSWORD: 1234
    restart: always
    depends_on:
      pruebatecsuper:
        condition: service_healthy
  pruebatecsuper: #configuraciones de base de datos dockerizada
    image: mysql:8.0.33 #misma versión que esté en el pom
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234 
      MYSQL_USER: nancy
      MYSQL_PASSWORD: 1234
      MYSQL_DATABASE: pruebatecsuper
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 10